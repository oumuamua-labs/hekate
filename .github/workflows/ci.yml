name: CI workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  changes:
    name: Detect changed crates
    runs-on: ubuntu-24.04-arm
    outputs:
      crypto: ${{ steps.f.outputs.crypto }}
      core: ${{ steps.f.outputs.core }}
      program: ${{ steps.f.outputs.program }}
      verifier: ${{ steps.f.outputs.verifier }}
      gadgets: ${{ steps.f.outputs.gadgets }}
      sdk: ${{ steps.f.outputs.sdk }}
      scribble: ${{ steps.f.outputs.scribble }}
      keccak: ${{ steps.f.outputs.keccak }}
      aes: ${{ steps.f.outputs.aes }}
      pqc: ${{ steps.f.outputs.pqc }}
      hekate: ${{ steps.f.outputs.hekate }}
      workspace: ${{ steps.f.outputs.workspace }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            workspace:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - '.github/workflows/**'
            crypto:
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            core:
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            program:
              - 'hekate-program/**'
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            verifier:
              - 'hekate-verifier/**'
              - 'hekate-program/**'
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            gadgets:
              - 'hekate-gadgets/**'
              - 'hekate-program/**'
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            sdk:
              - 'hekate-sdk/**'
              - 'hekate-verifier/**'
              - 'hekate-program/**'
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            scribble:
              - 'hekate-scribble/**'
              - 'hekate-sdk/**'
              - 'hekate-gadgets/**'
              - 'hekate-program/**'
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            keccak:
              - 'hekate-keccak/**'
              - 'hekate-program/**'
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            aes:
              - 'hekate-aes/**'
              - 'hekate-program/**'
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            pqc:
              - 'hekate-pqc/**'
              - 'hekate-keccak/**'
              - 'hekate-gadgets/**'
              - 'hekate-program/**'
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            hekate:
              - 'hekate/**'
              - 'hekate-pqc/**'
              - 'hekate-keccak/**'
              - 'hekate-aes/**'
              - 'hekate-scribble/**'
              - 'hekate-sdk/**'
              - 'hekate-verifier/**'
              - 'hekate-gadgets/**'
              - 'hekate-prover-sys/**'
              - 'hekate-program/**'
              - 'hekate-core/**'
              - 'hekate-crypto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  fmt:
    name: Rustfmt
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  audit:
    name: Audit + deny
    needs: changes
    if: needs.changes.outputs.workspace == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit, cargo-deny
      - run: cargo audit
      - run: cargo deny check

  test:
    name: ${{ matrix.crate }}
    needs: changes
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: hekate-crypto
            filter: crypto
            test_args: "--all-features"
          - crate: hekate-core
            filter: core
            test_args: "--all-features"
          - crate: hekate-program
            filter: program
            test_args: "--all-features"
          - crate: hekate-verifier
            filter: verifier
            test_args: "--all-features"
          - crate: hekate-gadgets
            filter: gadgets
            test_args: "--all-features"
          - crate: hekate-sdk
            filter: sdk
            test_args: "--all-features"
          - crate: hekate-scribble
            filter: scribble
            test_args: "--all-features"
          - crate: hekate-keccak
            filter: keccak
            test_args: "--release"
          - crate: hekate-aes
            filter: aes
            test_args: "--release"
          - crate: hekate-pqc
            filter: pqc
            test_args: "--release"
          - crate: hekate
            filter: hekate
            test_args: "--release"
    steps:
      - name: Should run
        id: run
        env:
          CHANGES: ${{ toJSON(needs.changes.outputs) }}
          FILTER: ${{ matrix.filter }}
        run: |
          val=$(echo "$CHANGES" | jq -r --arg k "$FILTER" '.[$k] // "false"')
          if [ "$val" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.run.outputs.skip == 'false'
        uses: actions/checkout@v5

      - if: steps.run.outputs.skip == 'false'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - if: steps.run.outputs.skip == 'false'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.crate }}

      - if: steps.run.outputs.skip == 'false'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - if: steps.run.outputs.skip == 'false'
        name: Clippy
        run: cargo clippy -p ${{ matrix.crate }} --all-targets --all-features -- -D warnings

      - if: steps.run.outputs.skip == 'false'
        name: Nextest
        run: cargo nextest run -p ${{ matrix.crate }} ${{ matrix.test_args }}
